version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gitfit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gitfit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gitfit_password}
      POSTGRES_DB: ${POSTGRES_DB:-gitfit}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gitfit} -d ${POSTGRES_DB:-gitfit}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
    driver: local
