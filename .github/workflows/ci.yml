name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:cov
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check Sonar token
        id: sonar_token
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN is not set. Skip SonarCloud analysis."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.sonar_token.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        if: ${{ steps.sonar_token.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage

      - name: SonarCloud Scan
        if: ${{ steps.sonar_token.outputs.enabled == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate
        if: ${{ steps.sonar_token.outputs.enabled == 'true' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-render:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: [test, sonar]
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.result == 'success' && (needs.sonar.result == 'success' || needs.sonar.result == 'skipped') }}

    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set. Skip deploy."
            exit 0
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
